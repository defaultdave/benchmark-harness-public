    <text x="309.0397443055114" y="227" font-size="10" fill="#374151" dominant-baseline="middle" text-anchor="start">2.3M ops/sec</text>
    <text x="645" y="217" font-size="10" fill="#3b82f6" text-anchor="end" dominant-baseline="middle" font-weight="bold">1.51x</text>
