    <rect x="180" y="280" width="59.358202106765425" height="18" fill="#8b5cf6" rx="3"/>
    <text x="244.35820210676542" y="289" font-size="10" fill="#374151" dominant-baseline="middle" text-anchor="start">1.1M ops/sec</text>
    <text x="645" y="279" font-size="10" fill="#3b82f6" text-anchor="end" dominant-baseline="middle" font-weight="bold">1.65x</text>
